name: Deploy to WordPress.org SVN

# DISABLED until the plugin is approved on WordPress.org.
# Auto-deploy on release is intentionally turned off so publishing a GitHub
# release does not fail against a not-yet-existing SVN repository.
# To re-enable after approval, restore the release trigger below:
#
#   on:
#     release:
#       types: [published]
#
# For now the workflow only runs on manual dispatch (Actions tab -> Run workflow).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: metricpulse
          ASSETS_DIR: assets
          BUILD_DIR: metricpulse
